name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-tracker-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci 2>&1

      - name: Check Expo config
        run: npx expo config --type public 2>&1 || true

      - name: Run Expo prebuild
        run: npx expo prebuild --platform android --clean 2>&1 || true

      - name: Check what was generated
        run: |
          echo "=== Android dir ==="
          ls -la android/ 2>/dev/null || echo "no android dir"
          echo "=== Gradle files ==="
          find android -name "*.gradle*" -type f 2>/dev/null | head -10
          echo "=== Settings ==="
          cat android/settings.gradle 2>/dev/null || echo "no settings"

      - name: Build debug APK
        run: |
          if [ -f android/gradlew ]; then
            cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon 2>&1 | tail -30
          else
            echo "No Gradle wrapper found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: family-tracker-app/android/app/build/outputs/**/*.apk
          if-no-files-found: warn
