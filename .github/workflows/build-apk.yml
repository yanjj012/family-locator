name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-tracker-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild
        run: npx expo prebuild --platform android --clean 2>&1

      - name: List generated files
        run: ls -la android/ 2>&1 || echo "no android dir"

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Upload APK (debug)
        uses: actions/upload-artifact@v4
        with:
          name: family-locator-apk
          path: |
            family-tracker-app/android/app/build/outputs/apk/debug/*.apk
            family-tracker-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
